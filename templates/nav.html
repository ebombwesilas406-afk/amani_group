<style>
  /* Custom Navbar Styling */
  .navbar {
    padding: 0.5rem 1rem;
    transition: all 0.3s ease;
  }
  
  @media (min-width: 768px) {
    .navbar {
      padding: 0.8rem 1rem;
    }
  }

  .navbar-brand {
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--primary-color) !important;
  }

  .nav-link {
    font-weight: 500;
    color: var(--bs-body-color) !important;
    margin: 0.25rem 2px;
    transition: color 0.2s ease;
    font-size: 0.9rem;
  }
  
  @media (min-width: 768px) {
    .nav-link {
      margin: 0 5px;
      font-size: 1rem;
    }
  }

  .nav-link:hover {
    color: var(--primary-color) !important;
  }

  /* Highlight the active page */
  .nav-link.active {
    color: var(--primary-color) !important;
    border-bottom: 2px solid var(--primary-color);
  }

  /* Style for the Membership 'Join' Button */
  .nav-membership-btn {
    background-color: var(--primary-color);
    color: white !important;
    border-radius: 8px;
    padding: 6px 14px !important;
    margin-left: 0 !important;
    margin-top: 0.5rem;
    font-size: 0.875rem;
  }
  
  @media (min-width: 576px) {
    .nav-membership-btn {
      padding: 8px 20px !important;
      margin-left: 10px !important;
      margin-top: 0 !important;
      font-size: 1rem;
    }
  }

  .nav-membership-btn:hover {
    background-color: #092c4d;
    color: white !important;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  }
</style>

<nav class="navbar navbar-expand-lg bg-body-tertiary sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
      <i class="bi bi-shield-check-fill me-2"></i> Unit Trust
    </a>

    <button
      class="navbar-toggler border-0"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item">
          <a
            class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}"
            href="{% url 'home' %}"
            >Home</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link {% if request.resolver_match.url_name == 'about' %}active{% endif %}"
            href="{% url 'about' %}"
            >About</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link {% if request.resolver_match.url_name == 'rules' %}active{% endif %}"
            href="{% url 'rules' %}"
            >Rules</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link {% if request.resolver_match.url_name == 'support' %}active{% endif %}"
            href="{% url 'support' %}"
            >Support</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link {% if request.resolver_match.url_name == 'updates' %}active{% endif %}"
            href="{% url 'updates' %}"
            >News</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link {% if request.resolver_match.url_name == 'contact' %}active{% endif %}"
            href="{% url 'contact' %}"
            >Contact</a
          >
        </li>

        <li class="nav-item">
          <button
            class="btn nav-link px-3 border-0"
            id="themeToggler"
            type="button"
            title="Toggle dark/light mode"
          >
            <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
          </button>
        </li>

        <li class="nav-item">
          <a
            class="nav-link nav-membership-btn shadow-sm"
            href="{% url 'membership' %}"
          >
            <i class="bi bi-person-plus-fill me-1"></i> Join SACCO
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
