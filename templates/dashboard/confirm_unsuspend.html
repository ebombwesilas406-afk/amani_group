{% extends 'dashboard/base.html' %}
{% block title %}Unsuspend Member — Dashboard{% endblock %}
{% block dashboard_content %}
<div class="container">
  <h3>Unsuspend Member</h3>
  <p>Are you sure you want to unsuspend <strong>{{ member.full_name }}</strong> ({{ member.phone_number }})?</p>
  <form method="post">
    {% csrf_token %}
    <button class="btn btn-success">Yes, Unsuspend</button>
    <a class="btn btn-secondary" href="{% url 'members:members_list' %}">Cancel</a>
  </form>
</div>
{% endblock %}
